<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" type="image/svg+xml" href="/broken-hearts/favicon.svg" />
  <link rel="apple-touch-icon" href="/broken-hearts/favicon.svg" />
  <title>Разбитые сердца</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #16213e 0%, #1a1a2e 30%, #1a1a2e 70%, #0f0f1a 100%);
    }
    .app-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }
    /* Админ-панель (godmode): только в браузере; в Telegram (Mini App) скрыта */
    #admin-panel {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 160px;
      padding: 12px 10px;
      background: rgba(0,0,0,0.85);
      border-radius: 0 8px 8px 0;
      display: none; /* показывается в main.js, если не в Telegram */
      flex-direction: column;
      gap: 8px;
      z-index: 2147483647;
      pointer-events: auto;
      overflow-y: auto;
    }
    #admin-panel button {
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #2a2a4a;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 6px;
      pointer-events: auto;
    }
    #admin-panel button:hover { background: #3a3a5a; color: #fff; }
    #admin-panel button:active { opacity: 0.9; }
    #admin-panel label { font-size: 11px; color: #888; margin-bottom: 2px; }
    #admin-feedback {
      font-size: 10px;
      color: #7cfc00;
      min-height: 14px;
      word-break: break-word;
    }
    #game-container {
      position: relative;
      flex: 1;
      min-width: 0;
      margin-left: 0; /* в браузере main.js ставит 160px при показе админ-панели */
      height: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #16213e 0%, #1a1a2e 20%, #1a1a2e 80%, #0f0f1a 100%);
    }
    /* Центрирование канваса (или обёртки Phaser) */
    #game-container > * {
      margin: auto;
      flex-shrink: 0;
    }
    #game-container canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
  <script type="module" crossorigin src="/broken-hearts/assets/index-D1fgG7P6.js"></script>
</head>
<body>
  <div class="app-wrap">
    <!-- Админ-панель для теста: выиграть / проиграть / заново / меню (потом удалить или скрыть) -->
    <div id="admin-panel">
      <label>Тест сцен (godmode)</label>
      <button type="button" id="admin-btn-win">Выиграть</button>
      <button type="button" id="admin-btn-lose">Проиграть</button>
      <button type="button" id="admin-btn-restart">Начать заново</button>
      <button type="button" id="admin-btn-menu">В меню</button>
      <div id="admin-feedback" aria-live="polite"></div>
    </div>
    <div id="game-container"></div>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
